spring.application.name=mockagent

# Puerto dinamico para Railway (usa PORT env var, fallback 8080 local)
server.port=${PORT:8080}

# Optimizaciones de arranque
spring.main.lazy-initialization=true

# Database: local por defecto, Railway/PlanetScale en produccion
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/mockagent?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:breogan12}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT: usar variable de entorno en produccion
jwt.secret=${JWT_SECRET:mockagent2026supersecretojwtkeyparaautenticacion12345678901234567890}
jwt.expiration=86400000

# Stripe (configurar al final del despliegue)
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.pro.monthly=${STRIPE_PRICE_PRO_MONTHLY:}
stripe.price.premium.monthly=${STRIPE_PRICE_PREMIUM_MONTHLY:}

# Google OAuth (Google Sign-In)
google.client.id=${GOOGLE_CLIENT_ID:}